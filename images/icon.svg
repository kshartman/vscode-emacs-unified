<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background circle - dark teal to distinguish from upstream purple/blue -->
  <circle cx="128" cy="128" r="120" fill="#1a3a3a" stroke="#0d2626" stroke-width="6"/>
  <!-- Inner ring -->
  <circle cx="128" cy="128" r="105" fill="none" stroke="#2d6b6b" stroke-width="1.5" opacity="0.5"/>
  <!-- "E" character - warm gold, centered -->
  <text x="128" y="180" font-family="Georgia, 'Times New Roman', serif" font-size="175" font-weight="bold" fill="#d4a843" text-anchor="middle" opacity="0.95">E</text>
</svg>
