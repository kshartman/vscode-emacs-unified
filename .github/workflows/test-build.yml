name: Lint and Build

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions: {}

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run check:eslint

      - name: Prettier
        run: npm run check:prettier

      - name: Keybinding generator tests
        run: npm run test-gen-keys

      - name: Check keybinding diff
        run: |
          npm run gen-keys
          git diff --exit-code || (echo "Run 'npm run gen-keys' and commit the updated package.json" && exit 1)

      - name: Build
        run: npm run webpack:prod

      - name: Build web
        run: npm run package-web
